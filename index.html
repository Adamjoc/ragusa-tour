<!DOCTYPE html>
<html>
<head>
  <title>Ragusa Walking Tour</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { margin:0; }
    #map { height:100vh; }
    .popup img {
      width:100%;
      border-radius:8px;
      margin-bottom:5px;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([36.924, 14.740], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// TOUR STOPS
const stops = [
{
  name: "Santa Maria delle Scale",
  coords: [36.9269,14.7373],
  img: "https://upload.wikimedia.org/wikipedia/commons/3/3e/Ragusa_Ibla_view.jpg",
  text: "One of the best panoramic views in Sicily. From here you descend into Ibla."
},
{
  name: "Descent into Ibla",
  coords: [36.9255,14.7385],
  img: "https://upload.wikimedia.org/wikipedia/commons/8/88/Ragusa_stairs.jpg",
  text: "Walk down through winding streets connecting the two parts of Ragusa."
},
{
  name: "Duomo di San Giorgio",
  coords: [36.9238,14.7405],
  img: "https://upload.wikimedia.org/wikipedia/commons/5/5f/Duomo_Ragusa.jpg",
  text: "The iconic Baroque cathedral and heart of Ragusa Ibla."
},
{
  name: "Piazza Duomo",
  coords: [36.9236,14.7410],
  img: "https://upload.wikimedia.org/wikipedia/commons/0/0e/Ragusa_piazza.jpg",
  text: "Relax here, take photos, and enjoy the atmosphere."
},
{
  name: "Palazzo La Rocca",
  coords: [36.9229,14.7419],
  img: "https://upload.wikimedia.org/wikipedia/commons/6/66/Palazzo_La_Rocca.jpg",
  text: "Famous for its dramatic baroque balconies."
},
{
  name: "Giardino Ibleo",
  coords: [36.9205,14.7448],
  img: "https://upload.wikimedia.org/wikipedia/commons/f/f5/Giardino_Ibleo.jpg",
  text: "Beautiful gardens and a peaceful end to the walk."
},
{
  name: "Dinner at Imperfetta",
  coords: [36.9212,14.7440],
  img: "https://images.unsplash.com/photo-1555992336-03a23c6f7c70",
  text: "Finish your tour with dinner — one of the best spots in Ragusa."
}
];

// MARKERS WITH IMAGES
stops.forEach((stop,i)=>{
  const popup = `
    <div class="popup">
      <img src="${stop.img}">
      <b>${i+1}. ${stop.name}</b><br>
      ${stop.text}
    </div>
  `;

  L.marker(stop.coords)
    .addTo(map)
    .bindPopup(popup);
});

// SIMPLE ROUTE (cleaner than before)
const route = stops.map(s=>s.coords);
L.polyline(route,{color:'red',weight:4}).addTo(map);

</script>
</body>
</html>
