<!DOCTYPE html>
<html>
<head>
  <title>Ragusa Walking Tour</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { margin:0; }
    #map { height:100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([36.924, 14.740], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

const stops = [
  ["1. Santa Maria delle Scale", 36.9269, 14.7373],
  ["2. Chiesa del Purgatorio", 36.9256, 14.7390],
  ["3. Duomo di San Giorgio", 36.9238, 14.7405],
  ["4. Circolo di Conversazione", 36.9235, 14.7410],
  ["5. Palazzo La Rocca", 36.9229, 14.7419],
  ["6. Portale di San Giorgio", 36.9219, 14.7432],
  ["7. Giardino Ibleo", 36.9205, 14.7448]
];

let route = [];

stops.forEach(stop => {
  L.marker([stop[1], stop[2]])
    .addTo(map)
    .bindPopup("<b>" + stop[0] + "</b>");

  route.push([stop[1], stop[2]]);
});

L.polyline(route, {color:'red'}).addTo(map);
</script>

</body>
</html>
